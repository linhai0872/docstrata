# Judge 配置 —— 换模型/换厂商只改这里，不碰代码。
#
# protocol 决定调用协议（两类覆盖所有主流服务）：
#   openai     —— OpenAI 及一切 OpenAI 兼容端点（官方 / Ollama / OpenRouter / ZenMux /
#                 vLLM / Together / DeepSeek 官方 / 通义官方 …）。POST {base_url}/chat/completions
#   anthropic  —— Anthropic 官方 Messages API。POST {base_url}/v1/messages
#
# api_key_env：从该环境变量读 key（写进 eval/.env）。本地 Ollama 无需 key，留空即可。
# enabled：参与评测的 judge。启用 1 个 = 单 judge 快速档；启用 ≥2 个 = ensemble（中位数+分歧度）。
#
# 默认给一组去相关 ensemble（DeepSeek / OpenAI / 阿里，经 ZenMux 聚合）。
# 想换成自己的端点，照下方注释的范例改 base_url + model + api_key_env 即可。

judges:
  - name: deepseek
    protocol: openai
    base_url: https://zenmux.ai/api/v1
    model: deepseek/deepseek-v4-pro
    api_key_env: ZENMUX_API_KEY
    enabled: true

  - name: gpt
    protocol: openai
    base_url: https://zenmux.ai/api/v1
    model: openai/gpt-5.5
    api_key_env: ZENMUX_API_KEY
    enabled: true

  - name: qwen
    protocol: openai
    base_url: https://zenmux.ai/api/v1
    model: qwen/qwen3.7-max
    api_key_env: ZENMUX_API_KEY
    enabled: true

  # ---- 其它厂商范例（按需启用，把上面 ZenMux 三家 enabled 改 false）----
  #
  # OpenAI 官方：
  # - name: gpt
  #   protocol: openai
  #   base_url: https://api.openai.com/v1
  #   model: gpt-5.5
  #   api_key_env: OPENAI_API_KEY
  #   enabled: true
  #
  # Anthropic 官方：
  # - name: claude
  #   protocol: anthropic
  #   base_url: https://api.anthropic.com
  #   model: claude-sonnet-4-6
  #   api_key_env: ANTHROPIC_API_KEY
  #   enabled: true
  #
  # 本地 Ollama（无需 key，离线可跑）：
  # - name: local
  #   protocol: openai
  #   base_url: http://localhost:11434/v1
  #   model: qwen3
  #   api_key_env:
  #   enabled: true
  #
  # OpenRouter：
  # - name: gpt
  #   protocol: openai
  #   base_url: https://openrouter.ai/api/v1
  #   model: openai/gpt-5.5
  #   api_key_env: OPENROUTER_API_KEY
  #   enabled: true

# judge 公共参数（科学性：temperature 0 保证可复现；max_tokens 给足防 thinking 模型顶空输出）。
params:
  temperature: 0
  max_tokens: 16000
  timeout_s: 300
  retries: 2
